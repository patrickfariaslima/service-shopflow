services:
  postgres_db:
    image: postgres:16
    environment:
      POSTGRES_DB: shopflow
      POSTGRES_USER: shopflow_user
      POSTGRES_PASSWORD: shopflow_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow_user -d shopflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_db:5432/shopflow
      DB_USERNAME: shopflow_user
      DB_PASSWORD: shopflow_pass
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
